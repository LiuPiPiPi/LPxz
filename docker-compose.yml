services:
  api:
    build:
      context: ./flask_api
      args:
        HTTP_PROXY: ""
        HTTPS_PROXY: ""
        ALL_PROXY: ""
        http_proxy: ""
        https_proxy: ""
        all_proxy: ""
    env_file:
      - ./.env
    ports:
      - "${API_PORT:-8090}:8090"
    volumes:
      - ./flask_api/instance:/app/instance
      - ./flask_api/backups:/app/backups
    restart: unless-stopped

  view:
    build:
      context: ./lpxz_view
      args:
        HTTP_PROXY: ""
        HTTPS_PROXY: ""
        ALL_PROXY: ""
        http_proxy: ""
        https_proxy: ""
        all_proxy: ""
        VUE_APP_API_BASE_URL: ${VUE_APP_API_BASE_URL:-/api/}
        VUE_APP_NAME: ${VUE_APP_NAME:-prod}
        VUE_APP_DEFAULT_LOGIN_USERNAME: ${VUE_APP_DEFAULT_LOGIN_USERNAME:-}
    ports:
      - "${VIEW_PORT:-8080}:80"
    depends_on:
      - api
    restart: unless-stopped

  cms:
    build:
      context: ./lpxz_cms
      args:
        HTTP_PROXY: ""
        HTTPS_PROXY: ""
        ALL_PROXY: ""
        http_proxy: ""
        https_proxy: ""
        all_proxy: ""
        REACT_APP_API_BASE_URL: ${REACT_APP_API_BASE_URL:-/api/admin/}
        REACT_APP_SITE_URL: ${REACT_APP_SITE_URL:-https://lpxz.work}
        REACT_APP_ROUTER_BASENAME: ${REACT_APP_ROUTER_BASENAME:-/cms}
    ports:
      - "${CMS_PORT:-3000}:80"
    depends_on:
      - api
    restart: unless-stopped
